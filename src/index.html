<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>mxifund-pet</title>
<style>
  :root {
    --cyan: #4be1ff;
    --pink: #ff8ac2;
    --violet: #b18cff;
    --panel-bg: rgba(12, 18, 38, 0.78);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
  }
  body.preview {
    background: linear-gradient(180deg, #2b3a67 0%, #1a2547 60%, #141c38 100%);
  }
  body.preview-light {
    background: linear-gradient(180deg, #ffffff 0%, #f2f4f8 70%, #e4e8f0 100%);
  }
  #stage { position: fixed; inset: 0; }
  #three-canvas { position: absolute; inset: 0; }

  /* ---------- 气泡 ---------- */
  #bubble {
    position: absolute;
    max-width: 240px;
    padding: 9px 14px;
    background: rgba(255, 255, 255, 0.96);
    border: 2px solid var(--pink);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    font-size: 13.5px;
    font-weight: 600;
    color: #4a3050;
    box-shadow: 0 4px 18px rgba(255, 138, 194, 0.35), 0 2px 6px rgba(0,0,0,0.18);
    opacity: 0;
    transform: translate(-50%, 6px) scale(0.85);
    transition: opacity .22s ease, transform .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  #bubble.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
  #bubble::after {
    content: '';
    position: absolute;
    left: 18px; bottom: -8px;
    width: 12px; height: 12px;
    background: inherit;
    border-right: 2px solid var(--pink);
    border-bottom: 2px solid var(--pink);
    transform: rotate(45deg);
    border-radius: 2px;
  }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute;
    left: 50%;
    top: 10px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    background: var(--panel-bg);
    border: 1px solid rgba(75, 225, 255, 0.4);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 22px rgba(75, 225, 255, 0.18), inset 0 0 18px rgba(75, 225, 255, 0.06);
    font-family: 'Cascadia Code', Consolas, monospace;
    font-size: 12px;
    color: #cfefff;
    opacity: 0.4;
    transition: opacity .25s;
  }
  #hud:hover { opacity: 1; }
  #hud .logo {
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--cyan), var(--violet), var(--pink));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #hud .sep { color: rgba(160, 200, 230, 0.35); }
  #hud .val { color: #fff; font-weight: 700; }
  #hud .kaidu-alive { color: #ff7d7d; font-weight: 700; }
  #hud .kaidu-dead { color: #ffd76a; font-weight: 700; }

  /* 体力条 */
  #energy-wrap { display: flex; align-items: center; gap: 5px; }
  #energy-bar {
    width: 56px; height: 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.13);
    overflow: hidden;
  }
  #energy-fill {
    height: 100%;
    width: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #58f7b2, #4be1ff);
    transition: width .5s ease, background .5s;
  }
  #energy-fill.low { background: linear-gradient(90deg, #ff9b6a, #ff6a8a); }

  #hud button {
    all: unset;
    cursor: pointer;
    width: 22px; height: 22px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    color: #9fdcff;
    font-size: 12px;
    transition: background .15s, color .15s, transform .15s;
  }
  #hud button:hover { background: rgba(75,225,255,0.18); color: #fff; transform: scale(1.12); }
  #hud button.quit:hover { background: rgba(255,90,120,0.25); color: #ff8fa5; }

  /* ---------- 查询全息面板 ---------- */
  #holo {
    position: absolute;
    width: 300px;
    padding: 14px 18px 16px;
    background: linear-gradient(160deg, rgba(10, 22, 48, 0.9), rgba(20, 12, 46, 0.88));
    border: 1px solid rgba(75, 225, 255, 0.55);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(75, 225, 255, 0.3), inset 0 0 30px rgba(75, 225, 255, 0.07);
    font-family: 'Cascadia Code', Consolas, monospace;
    color: #bfeaff;
    opacity: 0;
    transform: translate(-50%, 14px) scale(0.9);
    transition: opacity .3s, transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    overflow: hidden;
  }
  #holo.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
  #holo::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(120, 220, 255, 0.045) 3px 4px);
    pointer-events: none;
  }
  #holo .holo-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: #7fd4ff;
    display: flex;
    justify-content: space-between;
  }
  #holo .holo-title .dot { color: #58f7b2; animation: blink-dot 1s infinite; }
  @keyframes blink-dot { 50% { opacity: 0.2; } }
  #holo .holo-q {
    margin-top: 9px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    font-family: 'Microsoft YaHei', sans-serif;
    text-align: center;
  }
  #holo .holo-target {
    margin-top: 4px;
    text-align: center;
    font-size: 10.5px;
    color: rgba(150, 200, 240, 0.75);
  }
  #holo .scanbar {
    margin-top: 12px;
    height: 8px;
    border-radius: 4px;
    background: rgba(75, 225, 255, 0.12);
    overflow: hidden;
    position: relative;
  }
  #holo .scanbar .fill {
    position: absolute; inset: 0;
    width: 0%;
    background: linear-gradient(90deg, #4be1ff, #b18cff);
    box-shadow: 0 0 12px rgba(75,225,255,0.8);
    border-radius: 4px;
  }
  #holo .scan-log {
    margin-top: 9px;
    font-size: 10.5px;
    line-height: 1.55;
    color: #86c9ea;
    height: 48px;
    overflow: hidden;
  }
  #holo .verdict {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(8, 12, 30, 0.82);
    backdrop-filter: blur(3px);
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  #holo .verdict.show { opacity: 1; }
  #holo .verdict .stamp {
    font-family: 'Microsoft YaHei', sans-serif;
    font-size: 44px;
    font-weight: 900;
    padding: 6px 26px;
    border: 4px solid;
    border-radius: 10px;
    transform: rotate(-12deg) scale(3);
    opacity: 0;
  }
  #holo .verdict.show .stamp {
    animation: stamp-in .38s cubic-bezier(.25,1.4,.5,1) forwards;
  }
  @keyframes stamp-in {
    to { transform: rotate(-12deg) scale(1); opacity: 1; }
  }
  #holo .stamp.no { color: #ff5f7a; border-color: #ff5f7a; text-shadow: 0 0 22px rgba(255,95,122,0.7); }
  #holo .stamp.yes { color: #ffd76a; border-color: #ffd76a; text-shadow: 0 0 26px rgba(255,215,106,0.9); }

  /* ---------- 庆祝横幅 ---------- */
  #banner {
    position: absolute;
    left: 50%; top: 24%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 46px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 30px var(--pink), 0 0 60px var(--violet), 0 4px 0 rgba(0,0,0,0.25);
    background: linear-gradient(90deg, #ffd76a, #ff8ac2, #b18cff, #4be1ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(255, 180, 220, 0.75));
    pointer-events: none;
    white-space: nowrap;
  }
  #banner.show { animation: banner-pop .6s cubic-bezier(.22,1.6,.36,1) forwards; }
  @keyframes banner-pop { to { transform: translate(-50%, -50%) scale(1); } }

  /* ---------- 点击爱心 ---------- */
  .heart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: heart-float 1.1s ease-out forwards;
  }
  @keyframes heart-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.6); }
    100% { opacity: 0; transform: translate(-50%, -70px) scale(1.25); }
  }

  /* 预览模式提示 */
  #preview-tag {
    position: absolute;
    right: 12px; top: 12px;
    font: 11px 'Cascadia Code', Consolas, monospace;
    color: rgba(160, 210, 250, 0.6);
    display: none;
  }
  body.preview #preview-tag { display: block; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="three-canvas"></canvas>

    <div id="hud">
      <span class="logo">MXIFUND·模型一组</span>
      <span class="sep">│</span>
      <span>第<span class="val" id="hud-day">1</span>天</span>
      <span class="sep">│</span>
      <span>凯读:<span class="kaidu-alive" id="hud-kaidu">存活</span></span>
      <span class="sep">│</span>
      <span id="energy-wrap">体力<div id="energy-bar"><div id="energy-fill"></div></div></span>
      <span class="sep">│</span>
      <span id="hud-state" class="val">起</span>
      <span class="sep">│</span>
      <button id="btn-skip" title="快进本阶段">⏩</button>
      <button id="btn-query" title="立刻查询战况">🛰</button>
      <button class="quit" id="btn-quit" title="下班（退出）">✕</button>
    </div>

    <div id="bubble"></div>

    <div id="holo">
      <div class="holo-title"><span>KAIDU-MONITOR v9.9</span><span class="dot">●</span></div>
      <div class="holo-q">是否干翻凯读？</div>
      <div class="holo-target">target: kendallsquarecap.com</div>
      <div class="scanbar"><div class="fill" id="scan-fill"></div></div>
      <div class="scan-log" id="scan-log"></div>
      <div class="verdict" id="verdict"><div class="stamp no" id="stamp">否</div></div>
    </div>

    <div id="banner">凯读已被干翻！</div>
    <div id="preview-tag">PREVIEW MODE</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "../node_modules/three/build/three.module.js",
      "three/addons/": "../node_modules/three/examples/jsm/",
      "@pixiv/three-vrm": "../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
    }
  }
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
